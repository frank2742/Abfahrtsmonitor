<!DOCTYPE html>

<head>
    <style>
        body {
            display: grid;
            grid-template-areas: "tram fv"
                                "ubahn fv";
            /* Hier das Verhältnis der Spalten einstellen*/
            grid-template-columns: 1fr 2fr;
            margin: 0;
            height: 100vh;
        }

        iframe {
            border: none;
            height: 100%;
            width: 100%
        }

        iframe.zoomed {
            /* Hier den Zoom des FV-Iframes einstellen */
            zoom: 0.65;
            -moz-transform: scale(0.5);
            -moz-transform-origin: 0 0;
            -o-transform: scale(0.5);
            -o-transform-origin: 0 0;
            -webkit-transform: scale(0.5);
            -webkit-transform-origin: 0 0;
            width: 200%;
            height: 200%;
        }

        .tram {
            grid-area: tram;
        }

        .ubahn {
            grid-area: ubahn;
        }

        .fv {
            grid-area: fv;
        }
    </style>
</head>

<body>

    <iframe class="tram"
        src="https://www.vgn.de/atafel?name=Nürnberg%2C+Juvenellstr.&dm=de%3A09564%3A231&layout=1&title=Tram+-+Juvenellstr.&means=4">
    </iframe>

    <iframe class="ubahn"
        src="https://www.vgn.de/atafel?name=Nürnberg%2C+Friedrich-Ebert-Platz&dm=de%3A09564%3A232&layout=1&title=U3+-+Friedrich-Ebert-Platz&means=2">
    </iframe>


    <iframe class="zoomed fv"
        src="https://ris-abfahrtstafel.noncd.db.de/?evaNumbers=8000284&filterTransports=HIGH_SPEED_TRAIN,INTERCITY_TRAIN,INTER_REGIONAL_TRAIN&includeStationGroup=false&timeSpan=180&pages=3">
    </iframe>

</body>
